# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci && npm run build
      - name: Deploy to Firebase Hosting
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SKYTEAM_APPROACH_GENERATOR }}
        run: |
          SA_FILE=$(mktemp --suffix=.json)
          printf '%s' "$SA_JSON" > "$SA_FILE"
          GOOGLE_APPLICATION_CREDENTIALS="$SA_FILE" \
            npx firebase-tools@latest deploy \
              --only hosting \
              --project skyteam-approach-generator \
              --non-interactive 2>&1 | tee /tmp/deploy.log
          exit_code=${PIPESTATUS[0]}
          rm -f "$SA_FILE"
          if [ "$exit_code" -ne 0 ] && grep -q "is the current active version" /tmp/deploy.log; then
            echo "Version already live — nothing to do."
            exit 0
          fi
          exit "$exit_code"
